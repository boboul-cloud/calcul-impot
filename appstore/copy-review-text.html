<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copier texte App Review</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-hover: #0d635d;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 55%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(980px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      padding: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.3rem;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }
    textarea {
      width: 100%;
      min-height: 470px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.86rem;
      line-height: 1.45;
      color: #111827;
      background: #fcfcff;
    }
    .actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--primary-hover); }
    .status {
      color: var(--muted);
      font-size: 0.9rem;
      min-height: 1.2rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Texte App Review pret a copier</h1>
    <p>
      Remplace d'abord REPLACE_WITH_YOUR_VIDEO_LINK par ton lien video (ou laisse la phrase "screen recording attached").
      Ensuite clique sur Copier le texte, puis colle dans App Store Connect.
    </p>

    <textarea id="reviewText">Hello App Review Team,

Thank you for your message. Please find all requested information below.

1) Screen recording on physical device
- The screen recording starts at app launch and shows the complete core user flow:
  - Launch app and open Home/Overview
  - Enter household status and income values
  - Scan/import a tax document
  - Show OCR extraction result and apply values
  - Enter deductions/credits/withholding
  - Open Assistant and generate tax-box suggestions
  - Run simulation and review calculation details
  - Export PDF summary
- Camera permission prompt is shown in the recording.
- No account registration/login/deletion.
- No in-app purchases or subscriptions.
- No user-generated social content/reporting/blocking.
- Screen recording availability:
  - If you provide a link: Video link: REPLACE_WITH_YOUR_VIDEO_LINK
  - If no link: The screen recording file is attached to this App Review response.

2) App purpose and value
- The app helps individuals in France estimate personal income tax and understand the tax calculation.
- It provides guided input, deductions/credits handling, OCR document import, detailed calculation breakdown, and PDF export.
- This is an informational simulator, not an official tax filing service.

3) Instructions to access main features
- No login required.
- Main review path:
  - Home: set family situation and children
  - Revenues: enter taxable income
  - Deductions and advantages: add deductions, credits, withholding
  - Assistant: optional AI guidance for tax boxes
  - Export: generate/share PDF summary
- Test credentials: not required.

4) External services/tools/platforms
- Tax configuration sources:
  - https://raw.githubusercontent.com/boboul-cloud/tax-config/main/tax_config.json
  - https://cdn.jsdelivr.net/gh/boboul-cloud/tax-config@main/tax_config.json
- Optional AI (only if user provides own API key):
  - https://api.openai.com/v1/chat/completions
- No third-party authentication service.
- No payment processor.
- No ad SDK.

5) Regional differences
- The app functions consistently across all regions.
- Content/use case is focused on French income tax estimation.

6) Regulated industry documentation
- The app does not provide regulated financial or tax advisory services.
- It is an informational estimate tool and does not submit tax returns.
- No special regulatory authorization is required for this scope.

Additional clarification
- Data is primarily processed on-device.
- AI is optional.
- OpenAI API key, when entered by the user, is stored locally on device.

Review contact
- Name: Robert Oulhen
- Email: bob.oulhen@gmail.com
- Phone: 0668707219

Thank you.</textarea>

    <div class="actions">
      <button id="copyBtn" type="button">Copier le texte</button>
      <span id="status" class="status"></span>
    </div>
  </main>

  <script>
    const copyBtn = document.getElementById('copyBtn');
    const textArea = document.getElementById('reviewText');
    const status = document.getElementById('status');

    async function copyText() {
      const value = textArea.value;
      try {
        await navigator.clipboard.writeText(value);
        status.textContent = 'Texte copie. Tu peux le coller dans App Store Connect.';
      } catch (err) {
        textArea.focus();
        textArea.select();
        const ok = document.execCommand('copy');
        status.textContent = ok
          ? 'Texte copie. Tu peux le coller dans App Store Connect.'
          : 'Impossible de copier automatiquement. Selectionne le texte puis Cmd+C.';
      }
    }

    copyBtn.addEventListener('click', copyText);
  </script>
</body>
</html>
